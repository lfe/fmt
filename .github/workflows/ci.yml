name: ci

on:
  workflow_dispatch:
  push:
    branches: [ main, release/*]
  pull_request:
    branches: [ main, release/*]
  schedule:
  - cron: "17 3 * * *"

jobs:

  core-builds:
    name: Erlang ${{ matrix.otp_version }} build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # The engine currently uses OTP-27+ syntax (triple-quoted strings,
        # `-doc`/`-moduledoc`), so the supported floor is OTP 27. The OTP 22-26
        # rows return once the backport lands (deferred — see
        # running-recommendations A1-R005); rebar3 is pinned per OTP major then
        # because rebar3 only supports the 3 newest majors.
        include:
          - otp_version: '29'
            rebar3_version: '3.27'
          - otp_version: '28'
            rebar3_version: '3.27'
          - otp_version: '27'
            rebar3_version: '3.27'

    steps:
    - uses: actions/checkout@v4
    - uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ matrix.otp_version }}
        rebar3-version: ${{ matrix.rebar3_version }}
    - name: Check rebar3 Version
      run: DEBUG=1 rebar3 --version
    - name: Compile
      run: make compile
    - name: Xref Checks
      run: make xref
    - name: Proper Tests
      run: make proper
    - name: Common Test
      run: make ct
    - name: Run Unit Tests
      run: make eunit
    # Coverage gate is an explicit arc deferral (running-recommendations A1-R005);
    # wire `--min_coverage` once the coverage slice lands.
    # - name: Test Coverage
    #   run: rebar3 as test do proper -c, cover -v --min_coverage=0

  dialyzer:
    name: Dialyzer (OTP 28)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: erlef/setup-beam@v1
      with:
        otp-version: '28'
        rebar3-version: '3.27'
    # The PLT build dominates dialyzer runtime; cache it across runs, keyed on
    # the OTP version and the dependency set.
    - name: Cache PLT
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/rebar3
          _build/default/*_plt
          _build/default/*.plt
        key: dialyzer-plt-otp28-${{ hashFiles('rebar.config', 'rebar.lock') }}
        restore-keys: |
          dialyzer-plt-otp28-
    - name: Dialyzer
      run: make dialyzer

  oracle-rust:
    name: Rust oracle (fmt + clippy + test)
    runs-on: ubuntu-latest
    # No `working-directory` default: the `make oracle-*` targets cd into
    # test/oracle themselves, so they run from the repo root.
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: test/oracle
    - name: Format check
      run: make oracle-fmt
    - name: Clippy (deny warnings)
      run: make oracle-clippy
    - name: Build (release)
      run: make oracle-build
    - name: Test
      run: make oracle-test

  differential-oracle:
    name: mjl differential oracle (cross-engine)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: erlef/setup-beam@v1
      with:
        otp-version: '28'
        rebar3-version: '3.27'
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: test/oracle
    # `make diff-oracle` builds the mjl reference binary, compiles the test
    # profile, then renders random documents through both our engine and the
    # pinned mjl reference and asserts reported-cost equality over a width
    # sweep; exits non-zero on any divergence (or a missing binary).
    - name: Run differential oracle
      run: make diff-oracle
